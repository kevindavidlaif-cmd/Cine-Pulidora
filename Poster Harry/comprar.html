<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Boletos - Cines Pulidora</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Comprar Boletos</h1>
    <p>Selecciona tu horario y asientos para comprar boletos.</p>
    <a href="index.html">Volver a la cartelera</a>

    <form action="#" method="post"> 
        <label for="horario">Selecciona Horario:</label>
        <select id="horario" name="horario">
            <option value="14:00">2:00 PM</option>
            <option value="17:00">5:00 PM</option>
            <option value="20:00">8:00 PM</option>
        </select>

        <h3>Selecciona Asientos:</h3>
        <div class="sala">
    
            <div class="fila">
                <span>Fila A:</span>
                <label><input type="checkbox" name="asiento" value="A1"> A1</label>
                <label><input type="checkbox" name="asiento" value="A2"> A2</label>
                <label><input type="checkbox" name="asiento" value="A3"> A3</label>
                <label><input type="checkbox" name="asiento" value="A4"> A4</label>
            </div>
            <div class="fila">
                <span>Fila B:</span>
                <label><input type="checkbox" name="asiento" value="B1"> B1</label>
                <label><input type="checkbox" name="asiento" value="B2"> B2</label>
                <label><input type="checkbox" name="asiento" value="B3"> B3</label>
                <label><input type="checkbox" name="asiento" value="B4"> B4</label>
            </div>
            <div class="fila">
                <span>Fila C:</span>
                <label><input type="checkbox" name="asiento" value="C1"> C1</label>
                <label><input type="checkbox" name="asiento" value="C2"> C2</label>
                <label><input type="checkbox" name="asiento" value="C3"> C3</label>
                <label><input type="checkbox" name="asiento" value="C4"> C4</label>
            </div>
        </div>

        <button onclick="alert('Has sido hackeado!')" type="submit">Confirmar Compra</button>
    </form>

   
</body>
</html>
